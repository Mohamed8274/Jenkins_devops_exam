server {
  listen 80;
  
  # 1. Intercepte les requêtes spécifiquement pour votre domaine
  server_name dev.albay.ip-ddns.com; 

  location /api/v1/movies {
    # 2. Transfère la requête telle quelle vers le service, sans réécrire l'URI
    proxy_pass http://movie_service:8000;
  }

  location /api/v1/casts {
    proxy_pass http://cast_service:8000;
  }
}