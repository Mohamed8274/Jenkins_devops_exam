apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image }}"
        ports:
        - containerPort: {{ .Values.postgres.port }}
          protocol: TCP
        env:
          - name: POSTGRES_USER
            value: "{{ .Values.postgres.env.POSTGRES_USER }}"
          - name: POSTGRES_PASSWORD
            value: "{{ .Values.postgres.env.POSTGRES_PASSWORD }}"
          - name: POSTGRES_DB
            value: "{{ .Values.postgres.env.POSTGRES_DB }}"
        volumeMounts:
          - name: postgres
            mountPath: /var/lib/postgresql/data/
      volumes:
        - name: postgres
          persistentVolumeClaim:
            claimName: pvc-postgres-{{ .Release.Namespace }}
