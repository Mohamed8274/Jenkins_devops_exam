apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-movie-{{ .Release.Namespace }}
  labels:
    app: movie-service
spec:
  storageClassName: {{ .Values.persistence.storageClass }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
