apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels: 
    app: nginx
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image }}"
          ports:
            - containerPort: {{ .Values.nginx.port }}
              protocol: TCP
          volumeMounts:
            - name: nginx-config-volume
              # Nginx lira ce fichier au lieu de sa page par défaut
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      # On déclare le volume basé sur le ConfigMap
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config
             