apiVersion: v1
kind: Service
metadata:
  name: movie-service
  labels:
    app: movie-service
spec:
  type: NodePort # ClusterIP 
  selector:
    app: movie-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: {{ .Values.movie.port }}
      # name: http
      # nodePort: {{ .Values.movie.nodePort }}
      
