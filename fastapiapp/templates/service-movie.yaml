apiVersion: v1
kind: Service
metadata:
  name: movie-service
  labels:
    app: movie-service
spec:
  type: NodePort
  selector:
    app: movie-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: {{ .Values.movie.port }}
      nodePort: {{ .Values.movie.nodePort }}
      
